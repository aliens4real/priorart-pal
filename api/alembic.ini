# Alembic configuration for PriorArt Pal.
#
# Run migrations:
#   uv run alembic upgrade head
#   uv run alembic downgrade -1
#   uv run alembic revision -m "description"   # for new migrations

[alembic]
script_location = alembic
prepend_sys_path = src
version_path_separator = os

# Database URL is read from the environment in alembic/env.py
# (driven by PAP_DATABASE_URL via priorart_pal.settings).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
