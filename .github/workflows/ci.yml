name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    name: API (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.8"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install
        run: uv sync --all-extras
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (mypy)
        run: uv run mypy src
      - name: Test (pytest)
        run: uv run pytest -q

  infra:
    name: Infra (synth + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.8"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install CDK CLI
        run: npm install -g aws-cdk@2.1120
      - name: Set up Python
        run: uv python install 3.12
      - name: Install
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Test (pytest)
        run: uv run pytest -q
      - name: CDK synth (no AWS calls)
        env:
          CDK_DEFAULT_ACCOUNT: "000000000000"
          CDK_DEFAULT_REGION: "us-east-1"
        run: uv run cdk synth --quiet

  web:
    name: Web (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --run
      - run: npm run build
