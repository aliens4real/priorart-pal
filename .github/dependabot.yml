version: 2
updates:
  # Backend Python deps
  - package-ecosystem: "uv"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps,api)"
    labels: ["dependencies", "api"]
    groups:
      python-dev:
        patterns: ["pytest*", "ruff*", "mypy*", "httpx*"]

  # Infra Python deps
  - package-ecosystem: "uv"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps,infra)"
    labels: ["dependencies", "infra"]

  # Frontend npm deps
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps,web)"
    labels: ["dependencies", "web"]
    groups:
      react-ecosystem:
        patterns: ["react*", "@types/react*", "@vitejs/*"]
      lint-and-test:
        patterns: ["eslint*", "vitest*", "@testing-library/*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps,ci)"
    labels: ["dependencies", "ci"]

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps,docker)"
    labels: ["dependencies", "docker"]
